<!-- Lab 5: AJAX Basics
 Objective
Call API and display data.
Use this API:
 https://jsonplaceholder.typicode.com/users
 Tasks
1. Fetch users using $.ajax()
2. Display data in table
3. Show loader before API call
4. Handle error case
5. Add search filter -->


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 5: AJAX Basics</title>
<script src="jquery4.0.js"></script>
<style>
    table, th, td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 5px;
    }
    #loader {
        display: none;
        font-weight: bold;
        color: green;
    }
</style>
</head>
<body>


<input type="text" id="search" placeholder="Search by name">
<p id="loader">Loading...</p>

<table id="userTable">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>City</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
$(document).ready(function(){

    function displayUsers(users) {
        let tbody = $("#userTable tbody");
        tbody.empty(); // Clear table
        users.forEach(user => {
            tbody.append(`<tr>
                <td>${user.id}</td>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.address.city}</td>
            </tr>`);
        });
    }

    $("#fetchBtn").click(function(){
        $("#loader").show(); 
        $.ajax({
            url: "https://jsonplaceholder.typicode.com/users",
            method: "GET",
            success: function(data){
                $("#loader").hide();
                displayUsers(data);
            },
            error: function(){
                $("#loader").hide();
                alert("Error fetching data!");
            }
        });
    });

    $("#search").on("keyup", function(){
        let value = $(this).val().toLowerCase();
        $("#userTable tbody tr").filter(function(){
            $(this).toggle($(this).find("td:eq(1)").text().toLowerCase().indexOf(value) > -1)
        });
    });

});
</script>

</body>
</html>
