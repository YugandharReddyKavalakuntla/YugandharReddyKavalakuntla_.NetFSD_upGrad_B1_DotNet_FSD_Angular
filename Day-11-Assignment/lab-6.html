<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab 6: CRUD Name & Location</title>
<script src="jquery4.0.js"></script>
<style>
    table, th, td { border:1px solid black; border-collapse: collapse; padding: 5px; }
    input { margin: 5px; }
    #toast { display:none; position:fixed; top:10px; right:10px; background:green; color:white; padding:10px; border-radius:5px;}
</style>
</head>
<body>

<h2>Users CRUD (Name & Location)</h2>

<form id="userForm">
    <input type="hidden" id="userId">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="location" placeholder="Location" required>
    <button type="submit">Save</button>
</form>

<table id="userTable">
    <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Location</th><th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div id="toast"></div>

<script>
const API = "http://localhost:3000/books";

function showToast(msg){
    $("#toast").text(msg).fadeIn(300).delay(1000).fadeOut(300);
}

function loadUsers(){
    $.ajax({
        url: API,
        method: "GET",
        success: function(data){
            let tbody = $("#userTable tbody");
            tbody.empty();
            data.forEach(user=>{
                tbody.append(`<tr>
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.location}</td>
                    <td>
                        <button class="editBtn" data-id="${user.id}">Edit</button>
                        <button class="deleteBtn" data-id="${user.id}">Delete</button>
                    </td>
                </tr>`);
            });
        }
    });
}

$("#userForm").submit(function(e){
    e.preventDefault();
    let id = $("#userId").val();
    let userData = {
        name: $("#name").val(),
        location: $("#location").val()
    };

    if(!userData.name || !userData.location){
        alert("Please fill all fields!");
        return;
    }

    if(id){ 
        $.ajax({
            url: `${API}/${id}`,
            method: "PUT",
            data: userData,
            success: function(){ showToast("User updated!"); loadUsers(); $("#userForm")[0].reset(); $("#userId").val(""); }
        });
    } else { 
        $.ajax({
            url: API,
            method: "POST",
            data: userData,
            success: function(){ showToast("User added!"); loadUsers(); $("#userForm")[0].reset(); }
        });
    }
});

$("#userTable").on("click", ".editBtn", function(){
    let id = $(this).data("id");
    $.ajax({
        url: `${API}/${id}`,
        method: "GET",
        success: function(user){
            $("#userId").val(user.id);
            $("#name").val(user.name);
            $("#location").val(user.location);
        }
    });
});

$("#userTable").on("click", ".deleteBtn", function(){
    let id = $(this).data("id");
    if(confirm("Are you sure you want to delete this user?")){
        $.ajax({
            url: `${API}/${id}`,
            method: "DELETE",
            success: function(){ showToast("User deleted!"); loadUsers(); }
        });
    }
});

loadUsers();
</script>

</body>
</html>
