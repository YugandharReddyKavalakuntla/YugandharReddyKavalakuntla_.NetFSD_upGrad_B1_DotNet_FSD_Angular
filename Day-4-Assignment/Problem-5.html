 <!DOCTYPE html>
<html>
<head>
    <title>Number Analysis Tool</title>
</head>
<body>

<h2>Number Analysis Tool</h2>

<script>
    let number = 7;

    let sign = (number >= 0) ? "Positive Number" : "Negative Number";
    console.log(sign);

    if (number % 2 === 0) {
        console.log("The number is Even");
    } else {
        console.log("The number is Odd");
    }

    console.log("Numbers from 1 to " + number + ":");

    for (let i = 1; i <= number; i++) {
        console.log(i);
    }
</script>

</body>
</html>
