<!-- Problem 3: Location-Based Weather Logger (Level-2)
Scenario Create a web application that fetches the user's geographic location and stores location history in localStorage.
 📌 Requirements
	•	Button: Get My Location
	•	Use:
navigator.geolocation.getCurrentPosition()
	•	Display:
Latitude
Longitude
	•	Handle:
Permission denied
Timeout
Location unavailable
	•	Save last 5 location entries in localStorage.
	•	Display location history on page load.

🛠️ Technical Constraints
	•	Must handle:
Success callback
Error callback
	•	Use browser permission handling.
	•	Store data as JSON using:
JSON.stringify()
JSON.parse()
	•	Use inline event (onclick).
🎯 Learning Outcome
Learners should be able to:
	•	Geolocation API
	•	Handling browser permissions
	•	Error handling in APIs
	•	Managing structured data in localStorage
	•	JSON parsing and stringifying -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Location Logger</title>
</head>
<body>

<h2>Location-Based Logger</h2>

<button onclick="getLocation()">Get My Location</button>

<p id="status"></p>

<h3>Current Location</h3>
<p id="current"></p>

<h3>Location History (Last 5)</h3>
<ul id="history"></ul>

<script>
    function getLocation() {
        if (!navigator.geolocation) {
            document.getElementById("status").innerText =
                "Geolocation is not supported by this browser.";
            return;
        }

        document.getElementById("status").innerText =
            "Fetching location...";

        navigator.geolocation.getCurrentPosition(
            showPosition,
            showError,
            {
                timeout: 10000
            }
        );
    }

    function showPosition(position) {
        let latitude = position.coords.latitude;
        let longitude = position.coords.longitude;

        document.getElementById("current").innerText =
            `Latitude: ${latitude}, Longitude: ${longitude}`;

        saveLocation(latitude, longitude);
        loadHistory();

        document.getElementById("status").innerText =
            "Location fetched successfully.";
    }

    function showError(error) {
        let message = "";

        switch (error.code) {
            case error.PERMISSION_DENIED:
                message = "User denied location permission.";
                break;

            case error.TIMEOUT:
                message = "Location request timed out.";
                break;

            case error.POSITION_UNAVAILABLE:
                message = "Location information unavailable.";
                break;

            default:
                message = "Unknown error occurred.";
        }

        document.getElementById("status").innerText = message;
    }

    function saveLocation(lat, lon) {
        let locations =
            JSON.parse(localStorage.getItem("locations")) || [];

        locations.unshift({
            latitude: lat,
            longitude: lon,
            time: new Date().toLocaleString()
        });

        if (locations.length > 5) {
            locations.pop();
        }

        localStorage.setItem(
            "locations",
            JSON.stringify(locations)
        );
    }

    function loadHistory() {
        let historyList = document.getElementById("history");
        historyList.innerHTML = "";

        let locations =
            JSON.parse(localStorage.getItem("locations")) || [];

        locations.forEach(loc => {
            let li = document.createElement("li");
            li.innerText =
                `Lat: ${loc.latitude}, Lon: ${loc.longitude}
                 (${loc.time})`;
            historyList.appendChild(li);
        });
    }

    loadHistory();
</script>

</body>
</html>
